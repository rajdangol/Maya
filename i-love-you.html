<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I Love You Maya !!💕</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #fce4ec 0%, #f8bbd0 40%, #e1f5ee 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* ─── Floating hearts background ─── */
        .heart-bg {
            position: fixed;
            font-size: 18px;
            opacity: 0.15;
            animation: floatUp linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.15;
            }

            100% {
                transform: translateY(-120px) rotate(30deg);
                opacity: 0;
            }
        }

        /* ─── Title ─── */
        .title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            color: #c2185b;
            text-align: center;
            text-shadow: 2px 3px 0px #f48fb1;
            margin-bottom: 8px;
            animation: pulse 2.5s ease-in-out infinite;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: #ad1457;
            text-align: center;
            margin-bottom: 40px;
            opacity: 0.85;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }
        }

        /* ─── Scene ─── */
        .scene {
            position: relative;
            width: 340px;
            height: 280px;
            margin-bottom: 36px;
            z-index: 1;
        }

        /* ─── Baby's breath ─── */
        .babys-breath {
            position: absolute;
            bottom: 0;
        }

        /* ─── Pixel flower ─── */
        .pixel-flower {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            image-rendering: pixelated;
        }

        /* ─── Bee animation ─── */
        .bee-wrapper {
            position: absolute;
            animation: flyAround 6s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes flyAround {
            0% {
                top: 60px;
                left: 40px;
            }

            15% {
                top: 30px;
                left: 160px;
            }

            30% {
                top: 70px;
                left: 260px;
            }

            45% {
                top: 100px;
                left: 200px;
            }

            60% {
                top: 140px;
                left: 130px;
            }

            75% {
                top: 90px;
                left: 60px;
            }

            100% {
                top: 60px;
                left: 40px;
            }
        }

        .bee-pixel {
            image-rendering: pixelated;
            filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.15));
        }

        .bee-wings {
            animation: flutter 0.12s linear infinite alternate;
            transform-origin: center bottom;
        }

        @keyframes flutter {
            from {
                transform: scaleY(1);
            }

            to {
                transform: scaleY(0.6);
            }
        }

        .title-area {
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
        }

        .goose-wrapper {
            position: absolute;
            animation: orbitTitle 5s linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes orbitTitle {
            0% {
                top: -30px;
                left: -60px;
                transform: scaleX(1) rotate(-8deg);
            }

            20% {
                top: -50px;
                left: 30%;
                transform: scaleX(1) rotate(0deg);
            }

            40% {
                top: -30px;
                left: calc(100% + 20px);
                transform: scaleX(1) rotate(8deg);
            }

            50% {
                top: 10px;
                left: calc(100% + 30px);
                transform: scaleX(-1) rotate(-5deg);
            }

            70% {
                top: 30px;
                left: 40%;
                transform: scaleX(-1) rotate(0deg);
            }

            90% {
                top: 10px;
                left: -50px;
                transform: scaleX(-1) rotate(5deg);
            }

            100% {
                top: -30px;
                left: -60px;
                transform: scaleX(1) rotate(-8deg);
            }
        }

        .goose-wings-up {
            animation: gooseWing 0.3s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes gooseWing {
            from {
                transform: scaleY(1);
            }

            to {
                transform: scaleY(0.5);
            }
        }

        /* ─── Button ─── */
        .love-btn {
            background: #e91e63;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            cursor: pointer;
            box-shadow: 0 4px 0 #880e4f, 0 6px 16px rgba(233, 30, 99, 0.35);
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .love-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #880e4f, 0 10px 24px rgba(233, 30, 99, 0.4);
        }

        .love-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #880e4f;
        }

        /* ─── Dialog overlay ─── */
        .dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .dialog-overlay.open {
            display: flex;
        }

        .dialog-box {
            background: #fff9fb;
            border-radius: 20px;
            padding: 32px 28px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(194, 24, 91, 0.3);
            text-align: center;
            border: 2px solid #f48fb1;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ─── Dialog image box ─── */
        /* 
      TO ADD YOUR OWN PHOTO:
      Replace the <svg> inside .dialog-img-box with:
      <img src="your-photo.jpg" alt="us" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" />
    */
        .dialog-img-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            background: #fce4ec;
            border: 2px dashed #f48fb1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .dialog-img-box svg {
            width: 100%;
            height: 100%;
        }

        /* ─── Dialog message ─── */
        /*  ← EDIT THIS MESSAGE in the HTML below  */
        .dialog-msg {
            font-size: 1.15rem;
            color: #c2185b;
            font-style: italic;
            line-height: 1.7;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
        }

        .close-btn {
            background: #fce4ec;
            border: 1.5px solid #f48fb1;
            color: #c2185b;
            border-radius: 50px;
            padding: 8px 28px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: background 0.15s;
        }

        .close-btn:hover {
            background: #f8bbd0;
        }

        /* ─── Click hearts ─── */
        .click-heart {
            position: fixed;
            pointer-events: none;
            font-size: 22px;
            z-index: 999;
            animation: riseAndFade 1.2s ease-out forwards;
            transform-origin: center;
            user-select: none;
        }

        @keyframes riseAndFade {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            40% {
                opacity: 1;
                transform: translateY(-40px) scale(1.3);
            }

            100% {
                opacity: 0;
                transform: translateY(-90px) scale(0.8);
            }
        }

        .vespa-container {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .pixel-vespa {
            image-rendering: pixelated;
            filter: drop-shadow(2px 4px 4px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .vespa-container:hover .pixel-vespa {
            transform: translateY(-3px);
        }
    </style>
</head>

    <!-- Floating hearts script -->
    <script>
        const hearts = ['♥', '♡', '❤', '💕'];
        for (let i = 0; i < 16; i++) {
            const h = document.createElement('span');
            h.className = 'heart-bg';
            h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.left = Math.random() * 95 + '%';
            h.style.animationDuration = (6 + Math.random() * 10) + 's';
            h.style.animationDelay = (Math.random() * 8) + 's';
            h.style.fontSize = (12 + Math.random() * 18) + 'px';
            document.body.appendChild(h);
        }

        // Click anywhere to spawn a floating heart
        const clickSymbols = ['♥', '❤', '💕', '💖', '💗', '💓', '💝'];
        const clickColors = ['#e91e63', '#f06292', '#c2185b', '#ff4081', '#f48fb1', '#ad1457', '#ff80ab'];
        document.addEventListener('click', function (e) {
            // Don't fire on buttons or dialog
            if (e.target.closest('button') || e.target.closest('.dialog-box')) return;
            const h = document.createElement('span');
            h.className = 'click-heart';
            h.textContent = clickSymbols[Math.floor(Math.random() * clickSymbols.length)];
            h.style.left = (e.clientX - 12) + 'px';
            h.style.top = (e.clientY - 12) + 'px';
            h.style.color = clickColors[Math.floor(Math.random() * clickColors.length)];
            h.style.fontSize = (16 + Math.random() * 16) + 'px';
            document.body.appendChild(h);
            h.addEventListener('animationend', () => h.remove());
        });

        function handleBtnClick() {
            const vespa = document.getElementById('vespa');
            vespa.classList.remove('zoom');
            void vespa.offsetWidth; // reflow to restart animation
            vespa.classList.add('zoom');
            setTimeout(() => {
                document.getElementById('love-dialog').classList.add('open');
                vespa.classList.remove('zoom');
            }, 900);
        }
    </script>
